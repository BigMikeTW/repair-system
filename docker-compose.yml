version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: repair_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-repair_system}
      POSTGRES_USER: ${DB_USER:-repair_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-repair_admin} -d ${DB_NAME:-repair_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - repair_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repair_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-repair_system}
      DB_USER: ${DB_USER:-repair_admin}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-*}
      UPLOAD_DIR: /app/uploads
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    ports:
      - "5000:5000"
    networks:
      - repair_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: repair_frontend
    restart: unless-stopped
    networks:
      - repair_net

  nginx:
    image: nginx:alpine
    container_name: repair_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - repair_net

volumes:
  postgres_data:
  uploads_data:
  backups_data:

networks:
  repair_net:
    driver: bridge
